version: 2.1

# Continuation config triggered by .circleci/config.yml after path-filtering.
# run-app-pipeline is true only when relevant files changed; doc-only PRs
# short-circuit to a single noop job.

orbs:
  aws-cli: circleci/aws-cli@5.4.1

parameters:
  run-app-pipeline:
    type: boolean
    default: false

executors:
  python:
    docker:
      - image: cimg/python:3.12
  # Test-only credentials. The Postgres sidecar is ephemeral, bound to the
  # job's localhost namespace, gone when the job ends. For production, put
  # DB creds in a secrets manager and inject via a branch-restricted context.
  python-with-postgres:
    docker:
      - image: cimg/python:3.12
        environment:
          DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/appdb
      - image: cimg/postgres:16.2
        environment:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: appdb
  machine:
    machine:
      image: ubuntu-2404:current
      docker_layer_caching: true

commands:
  pip-install-dev:
    steps:
      - restore_cache:
          keys:
            - v1-pydeps-{{ checksum "requirements-dev.txt" }}
      - run:
          name: Install dev deps
          command: |
            python -m venv .venv
            . .venv/bin/activate
            pip install -r requirements-dev.txt
      - save_cache:
          key: v1-pydeps-{{ checksum "requirements-dev.txt" }}
          paths:
            - .venv

jobs:
  noop:
    docker:
      - image: cimg/base:current
    steps:
      - run: echo "no app/test/infra files changed; skipping pipeline"

  lint:
    executor: python
    steps:
      - checkout
      - pip-install-dev
      - run:
          name: ruff
          command: |
            . .venv/bin/activate
            ruff check app tests

  test:
    executor: python-with-postgres
    steps:
      - checkout
      - pip-install-dev
      - run: ./scripts/wait-for-postgres.sh
      - run:
          name: pytest with JUnit + coverage
          command: |
            . .venv/bin/activate
            mkdir -p test-results coverage
            pytest \
              --junitxml=test-results/pytest.xml \
              --cov=app --cov-report=xml:coverage/coverage.xml
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: coverage
          destination: coverage
      - store_artifacts:
          path: test-results
          destination: test-results

  build-image:
    executor: machine
    steps:
      - checkout
      - run:
          name: Build args
          command: ./scripts/generate-build-info.sh build.env
      - run:
          name: Build app image
          command: |
            set -a; . ./build.env; set +a
            docker build \
              --build-arg BUILD_SHA="$BUILD_SHA" \
              --build-arg BUILD_TIME="$BUILD_TIME" \
              -t "app:${CIRCLE_SHA1}" \
              .
      - run:
          name: Smoke test image
          command: ./scripts/smoke-test.sh "app:${CIRCLE_SHA1}"
      - run:
          name: Save image tar for downstream jobs
          command: |
            mkdir -p /tmp/image
            docker save "app:${CIRCLE_SHA1}" | gzip > "/tmp/image/app-${CIRCLE_SHA1}.tar.gz"
            cp build.env /tmp/image/
      - persist_to_workspace:
          root: /tmp/image
          paths:
            - "*.tar.gz"
            - build.env

  container-integration-test:
    executor: machine
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/image
      - run:
          name: Load image
          command: docker load < "/tmp/image/app-${CIRCLE_SHA1}.tar.gz"
      - run:
          name: Run end-to-end against real postgres
          command: ./scripts/integration-test.sh "app:${CIRCLE_SHA1}"

  security-scan:
    # Parallel with container-integration-test so the gate doesn't add
    # wall time. Both must pass before any publish.
    executor: machine
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/image
      - run:
          name: Load built image
          command: docker load < "/tmp/image/app-${CIRCLE_SHA1}.tar.gz"
      - run:
          name: Install scanners
          command: |
            set -euo pipefail
            python3 -m pip install --quiet --user bandit==1.7.9
            # Official install script — handles Trivy's per-version asset names
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sudo sh -s -- -b /usr/local/bin v0.70.0
      - run:
          name: Bandit (Python source SAST)
          command: |
            set -eo pipefail
            mkdir -p security-results
            # -ll = only flag MEDIUM+; raise to -lll for HIGH-only
            "$HOME/.local/bin/bandit" -r app -ll | tee security-results/bandit.txt
            # Bandit silently skips files it can't parse (e.g. on a future
            # Python it doesn't grok). If LOC scanned is 0, fail loud.
            total_loc=$(awk '/Total lines of code:/ {print $NF; exit}' security-results/bandit.txt)
            if [ "${total_loc:-0}" = "0" ]; then
              echo "ERROR: bandit scanned 0 lines of code in app/ — likely a parser failure" >&2
              exit 1
            fi
      - run:
          name: Trivy (container image CVE scan)
          command: |
            mkdir -p security-results
            # Gate on fixable HIGH/CRITICAL only. --ignore-unfixed skips
            # CVEs with no upstream fix; gating on those would block every
            # build for things we can't action. Full unfiltered list goes
            # to a separate artifact below for visibility.
            trivy image --no-progress \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              --format table \
              --output security-results/trivy-fixable.txt \
              "app:${CIRCLE_SHA1}"
            # Capture the unfiltered list as a separate artifact for review
            trivy image --no-progress \
              --severity HIGH,CRITICAL \
              --exit-code 0 \
              --format table \
              --output security-results/trivy-all.txt \
              "app:${CIRCLE_SHA1}"
      - store_artifacts:
          path: security-results
          destination: security-results
          when: always

  publish-ecr:
    executor: machine
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/image
      - run: docker load < "/tmp/image/app-${CIRCLE_SHA1}.tar.gz"
      - aws-cli/install
      - run:
          name: Exchange OIDC token for AWS creds
          command: ./scripts/aws-oidc-login.sh
      - run:
          name: Mark deploy as PENDING
          command: |
            circleci run release plan ecr-publish \
              --component-name=app-image \
              --environment-name=production \
              --target-version="${CIRCLE_SHA1}"
      - run:
          name: Push to ECR
          command: ./scripts/publish-ecr.sh "app:${CIRCLE_SHA1}"
      - run:
          name: Mark deploy SUCCESS
          when: on_success
          command: circleci run release update ecr-publish --status=SUCCESS
      - run:
          name: Mark deploy FAILED
          when: on_fail
          command: circleci run release update ecr-publish --status=FAILED

  publish-s3:
    executor: python
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/image
      - aws-cli/install
      - run:
          name: Exchange OIDC token for AWS creds
          command: ./scripts/aws-oidc-login.sh
      - run:
          name: Mark deploy as PENDING
          command: |
            circleci run release plan s3-publish \
              --component-name=release-tarball \
              --environment-name=production \
              --target-version="${CIRCLE_SHA1}"
      - run:
          name: Upload release tarball + manifest
          command: ./scripts/publish-s3.sh "/tmp/image/app-${CIRCLE_SHA1}.tar.gz"
      - run:
          name: Mark deploy SUCCESS
          when: on_success
          command: circleci run release update s3-publish --status=SUCCESS
      - run:
          name: Mark deploy FAILED
          when: on_fail
          command: circleci run release update s3-publish --status=FAILED

  deploy-apprunner:
    # Rolls the published SHA onto a service (dev or prod) and polls until
    # the operation reaches a terminal state.
    parameters:
      env:
        type: enum
        enum: ["dev", "prod"]
    executor: python
    steps:
      - checkout
      - aws-cli/install
      - run:
          name: Exchange OIDC token for AWS creds
          command: ./scripts/aws-oidc-login.sh
      - run:
          name: Mark deploy as PENDING
          command: |
            circleci run release plan apprunner-<< parameters.env >> \
              --component-name=apprunner-service \
              --environment-name=<< parameters.env >> \
              --target-version="${CIRCLE_SHA1}"
      - run:
          name: Update App Runner service (<< parameters.env >>)
          command: ./scripts/deploy-apprunner.sh << parameters.env >>
      - run:
          name: Mark deploy SUCCESS
          when: on_success
          command: circleci run release update apprunner-<< parameters.env >> --status=SUCCESS
      - run:
          name: Mark deploy FAILED
          when: on_fail
          command: circleci run release update apprunner-<< parameters.env >> --status=FAILED

workflows:
  skip:
    when:
      not: << pipeline.parameters.run-app-pipeline >>
    jobs:
      - noop

  build-test-publish:
    when: << pipeline.parameters.run-app-pipeline >>
    jobs:
      - lint
      - test:
          requires: [lint]

      - build-image:
          requires: [test]

      - container-integration-test:
          requires: [build-image]

      # SAST + container CVE scan, parallel with the integration test so
      # the gate doesn't add wall time. Both must pass before any publish.
      - security-scan:
          requires: [build-image]

      # Publish jobs fire on master only, after the integration test AND
      # security scan pass. The context they pull from is branch-restricted
      # to master in CircleCI; the IAM trust policy is also pinned to this
      # project + master via the OIDC sub claim. Credentials unreachable
      # from forks, feature branches, or any non-approved build.
      - publish-ecr:
          context: aws-prod-publish
          requires: [container-integration-test, security-scan]
          filters:
            branches:
              only: master

      - publish-s3:
          context: aws-prod-publish
          requires: [container-integration-test, security-scan]
          filters:
            branches:
              only: master

      # Deploy the new image to App Runner. Dev runs auto after publish-ecr;
      # prod waits on a manual approval gate.
      - deploy-apprunner:
          name: deploy-dev
          env: dev
          context: aws-prod-publish
          requires: [publish-ecr]
          filters:
            branches:
              only: master

      - approve-prod-deploy:
          type: approval
          requires: [deploy-dev]
          filters:
            branches:
              only: master

      - deploy-apprunner:
          name: deploy-prod
          env: prod
          context: aws-prod-publish
          requires: [approve-prod-deploy]
          filters:
            branches:
              only: master
